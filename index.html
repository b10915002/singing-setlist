<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>陪玩歌手應徵歌單</title>
    <meta
      name="description"
      content="陪玩歌手應徵用歌單，整理可演唱曲目供老闆快速瀏覽。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles-normal.css?v=zen-old-mincho-1" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="#page-title">SINGING LIST</a>
      <nav class="site-nav" aria-label="頁面導覽">
        <a href="#page-title">TOP</a>
        <span>/</span>
        <a href="#song-list-title">SETLIST</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="kicker">Play Singer Audition</p>
          <h1 id="page-title">這是<br />可演唱歌單。</h1>
          <p class="intro">
            整理目前可以穩定演唱的曲目，給老闆快速確認歌路與曲目。
          </p>
        </div>

        <aside class="stats-panel" aria-label="歌單統計">
          <span class="stats-number" id="song-count">0</span>
          <span class="stats-label">Songs Ready</span>
        </aside>
      </section>

      <section class="toolbar" aria-label="歌單工具">
        <label class="search-wrap">
          <span>SEARCH</span>
          <input id="song-search" type="search" placeholder="輸入歌名或歌手" />
        </label>
      </section>

      <section class="song-section" aria-labelledby="song-list-title">
        <div class="section-head">
          <p>SETLIST</p>
          <h2 id="song-list-title">曲目列表</h2>
          <span id="visible-count">0 首</span>
        </div>
        <ol class="song-list" id="song-list"></ol>
        <p class="empty-state" id="empty-state" hidden>目前找不到符合的歌曲。</p>
      </section>
    </main>

    <script src="songs.js"></script>
    <script>
      const songs = Array.isArray(window.SONGS) ? window.SONGS : [];
      const list = document.querySelector("#song-list");
      const search = document.querySelector("#song-search");
      const songCount = document.querySelector("#song-count");
      const visibleCount = document.querySelector("#visible-count");
      const emptyState = document.querySelector("#empty-state");

      songCount.textContent = songs.length;

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function normalize(value) {
        return value.toLowerCase().trim();
      }

      function renderSongs(query = "") {
        const needle = normalize(query);
        const visibleSongs = songs.filter((song) => {
          const haystack = normalize(`${song.title} ${song.artist}`);
          return haystack.includes(needle);
        });

        list.innerHTML = visibleSongs
          .map(
            (song, index) => `
              <li class="song-card">
                <span class="song-index">${String(index + 1).padStart(2, "0")}</span>
                <div>
                  <h3>${escapeHtml(song.title)}</h3>
                  <p>${escapeHtml(song.artist)}</p>
                </div>
              </li>
            `
          )
          .join("");

        visibleCount.textContent = `${visibleSongs.length} 首`;
        emptyState.hidden = visibleSongs.length !== 0;
      }

      search.addEventListener("input", (event) => {
        renderSongs(event.target.value);
      });

      renderSongs();
    </script>
  </body>
</html>
